<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Plantation Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css"> <!-- Reusing login style -->
    <link rel="stylesheet" href="css/darkmode.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Logo" class="logo-img">
            <span>Plantation Tracker</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#ABOUT">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="menu-toggle" id="mobile-menu">
            <span class="material-icons">menu</span>
        </div>
        <button class="theme-toggle" aria-label="Toggle Dark Mode">
            <span class="toggle-icon icon-sun">☀️</span>
            <span class="toggle-icon icon-moon">🌙</span>
        </button>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card card-glass">
            <div class="auth-header">
                <h2>Join the Movement</h2>
                <p>Create an account to start tracking</p>
            </div>

            <form action="#" method="post">
                <div class="grid-cols-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="grid-cols-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login Here</a></p>
            </div>
        </div>
    </div>
    <script src="js/theme.js"></script>
    <script src="js/main.js"></script>
    <script src="js/signin.js"></script>
</body>

</html>
