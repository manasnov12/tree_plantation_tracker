<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Plantation Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/darkmode.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Logo" class="logo-img">
            <span>Plantation Tracker</span>
        </div>
        <div class="nav-links" id="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#ABOUT">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="menu-toggle" id="mobile-menu">
            <span class="material-icons">menu</span>
        </div>
        <button class="theme-toggle" aria-label="Toggle Dark Mode">
            <span class="toggle-icon icon-sun">☀️</span>
            <span class="toggle-icon icon-moon">🌙</span>
        </button>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card card-glass">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Login to continue your green journey</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signin.html">Register Here</a></p>
            </div>
        </div>
    </div>
    <script src="js/theme.js"></script>
    <script src="js/main.js"></script>
    <script src="js/login.js"></script>
</body>

</html>
