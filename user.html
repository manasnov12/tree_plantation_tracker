<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | Plantation Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/user.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Logo" class="logo-img">
            <span>Plantation Tracker</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="purchase.html">Buy More</a>
            <a href="contact.html">Contact</a>
            <a href="login.html" class="btn btn-outline btn-sm" style="margin-left: 20px;">Logout</a>
        </div>
        <div class="menu-toggle" id="mobile-menu">
            <span class="material-icons">menu</span>
        </div>
    </nav>

    <div class="user-container">
        <header class="user-header">
            <div class="user-profile-header">
                <img src="assets/user.png.png" alt="User Profile" class="profile-pic">
                <div class="user-welcome">
                    <h1>Hello, <span id="display-username">Green Hero</span>!</h1>
                    <p>Track your contribution to the planet.</p>
                </div>
            </div>
        </header>

        <section class="stats-cards">
            <div class="stat-card">
                <div class="icon-box green">
                    <span class="material-icons">forest</span>
                </div>
                <div class="stat-info">
                    <h3>Trees Purchased</h3>
                    <p id="display-tree-count">0</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="icon-box orange">
                    <span class="material-icons">local_shipping</span>
                </div>
                <div class="stat-info">
                    <h3>Delivery Address</h3>
                    <p id="display-address" class="address-text">Not Set</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="icon-box teal">
                    <span class="material-icons">workspace_premium</span>
                </div>
                <div class="stat-info">
                    <h3>Impact Score</h3>
                    <p>Level 1 Planter</p>
                </div>
            </div>
        </section>

        <section class="recent-activity">
            <h2>Recent Activity</h2>
            <div class="activity-list">
                <div class="activity-item">
                    <div class="date">Oct 24</div>
                    <div class="detail">You joined Plantation Tracker</div>
                </div>
                <!-- JS can populate this -->
            </div>
        </section>
    </div>

    <script src="js/main.js"></script>
    <script src="js/user.js"></script>
</body>

</html>
